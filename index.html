<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Form</title>
<style>
body {
  font-family: Arial, sans-serif;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background: linear-gradient(135deg, #74ebd5, #ACB6E5);
  margin:0;
  color:#333;
}

h1 {
  margin-bottom:20px;
  color:#fff;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
}

input, button {
  padding:10px;
  font-size:1rem;
  margin:5px;
  border-radius:5px;
  border:none;
}

button {
  cursor:pointer;
  background:#4CAF50;
  color:white;
  font-weight:bold;
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<h1>Devkate Hospital - Token Form</h1>

<input type="text" id="name" placeholder="Enter Name" required>
<input type="text" id="mobile" placeholder="Enter Mobile" required>
<input type="number" id="age" placeholder="Enter Age" required>
<button onclick="submitForm()">Get Token</button>

<script>
function submitForm() {
    const name = document.getElementById('name').value.trim();
    const mobile = document.getElementById('mobile').value.trim();
    const age = document.getElementById('age').value.trim();

    if(!name || !mobile || !age){
        alert("Please fill all fields!");
        return;
    }

    // Daily reset check
    const today = new Date().toISOString().slice(0,10);
    const storedDate = localStorage.getItem('tokenDate');
    if(storedDate !== today){
        localStorage.removeItem('tokens');
        localStorage.setItem('nextToken','1');
        localStorage.setItem('tokenDate', today);
    }

    // Fetch existing tokens
    let tokens = JSON.parse(localStorage.getItem('tokens') || '{}');
    let nextToken = parseInt(localStorage.getItem('nextToken') || '1');

    const userKey = `${name}_${mobile}`;
    let tokenNumber;
    let alreadyReceived = false;

    if(tokens[userKey]){
        tokenNumber = tokens[userKey];
        alreadyReceived = true;
    } else {
        tokenNumber = nextToken;
        tokens[userKey] = tokenNumber;
        localStorage.setItem('tokens', JSON.stringify(tokens));
        localStorage.setItem('nextToken', nextToken + 1);
    }

    // Save current formData for display page
    localStorage.setItem('formData', JSON.stringify({name, mobile, age, tokenNumber, alreadyReceived}));

    // Redirect to creative display page
    window.location.href = "display.html";
}
</script>

</body>
</html>
