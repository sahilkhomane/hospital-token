<!DOCTYPE html>
<html>

<head>
<title>Hospital Token System</title>
</head>

<body>

<h1>Hospital Token System</h1>

<form onsubmit="generateToken(); return false;">

<label>Patient Name:</label><br>
<input type="text" required><br><br>

<label>Mobile Number:</label><br>
<input type="text" required><br><br>

<label>Age:</label><br>
<input type="number" required><br><br>

<button type="submit">Get Token</button>

</form>

<h2 id="token"></h2>

<script>

let token = localStorage.getItem("tokenCount") || 1;

function generateToken(){

document.getElementById("token").innerHTML = "Your Token Number is: " + token;

localStorage.setItem("lastToken", token);

token++;

localStorage.setItem("tokenCount", token);

}

</script>

</body>

</html>
