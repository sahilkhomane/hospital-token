<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Token System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f7f9;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    h1 { font-size: 2rem; margin-bottom: 20px; text-align: center; color: #333; }
    input, button { font-size: 1rem; padding: 10px; margin: 5px; border-radius: 5px; }
    button { background-color: #4CAF50; color: white; border: none; cursor: pointer; }
    #hospital-name { font-size: 1.2rem; color: #555; position: fixed; bottom: 20px; }
  </style>
</head>
<body>
  <h1>Hospital Token System</h1>

  <form id="patientForm">
    <input type="text" id="name" placeholder="Patient Name" required><br>
    <input type="text" id="mobile" placeholder="Mobile No" required><br>
    <input type="number" id="age" placeholder="Age" required><br>
    <button type="button" onclick="getToken()">Get Token</button>
  </form>

  <div id="token"></div>
  <div id="hospital-name">Devkate Hospital</div>

  <script>
    let counter = 1;
    function getToken() {
      let name = document.getElementById('name').value;
      let mobile = document.getElementById('mobile').value;
      let age = document.getElementById('age').value;

      if(!name || !mobile || !age){
        alert("Please fill all fields");
        return;
      }

      let tokenInfo = `Token No: ${counter} <br>
                       Name: ${name} <br>
                       Mobile: ${mobile} <br>
                       Age: ${age}`;
      document.getElementById('token').innerHTML = tokenInfo;
      counter++;
    }
  </script>
  <div id="footer" style="position: fixed; bottom: 10px; right: 10px; font-size: 0.9rem; color: #555;">
  Created by Sahil Khomane
</div>
</div>
</body>
</html>
